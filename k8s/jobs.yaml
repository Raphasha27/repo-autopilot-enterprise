apiVersion: batch/v1
kind: Job
metadata:
  name: repo-analysis-oneoff
spec:
  template:
    spec:
      containers:
      - name: analyzer
        image: repo-autopilot/repo-analyzer-worker:v1.0.0
        env:
          - name: API_BASE_URL
            value: "http://repo-autopilot-control-plane:8000"
          - name: MANUAL_TRIGGER
            value: "true"
      restartPolicy: Never
  backoffLimit: 4
