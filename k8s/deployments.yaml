apiVersion: apps/v1
kind: Deployment
metadata:
  name: repo-autopilot-control-plane
  labels:
    app: control-plane
spec:
  replicas: 2
  selector:
    matchLabels:
      app: control-plane
  template:
    metadata:
      labels:
        app: control-plane
    spec:
      containers:
        - name: control-plane
          image: repo-autopilot/control-plane:v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: REDIS_URL
              value: "redis://redis-service:6379/0"
            - name: POSTGRES_URL
              value: "postgresql://autopilot:secretpass@postgres-service:5432/autopilot_db"
            - name: POLICY_MAX_PRS_PER_HOUR
              value: "8"
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 500m
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-db
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "autopilot"
            - name: POSTGRES_PASSWORD
              value: "secretpass"
            - name: POSTGRES_DB
              value: "autopilot_db"
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-queue
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: repo-analyzer-worker
  labels:
    app: worker
    worker-type: analyzer
spec:
  replicas: 3
  selector:
    matchLabels:
      app: worker
      worker-type: analyzer
  template:
    metadata:
      labels:
        app: worker
        worker-type: analyzer
    spec:
      containers:
        - name: worker
          image: repo-autopilot/repo-analyzer-worker:v1.0.0
          env:
            - name: API_BASE_URL
              value: "http://repo-autopilot-control-plane:8000"
            - name: REDIS_URL
              value: "redis://redis-service:6379/0"
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 256Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pr-generator-worker
  labels:
    app: worker
    worker-type: pr-gen
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
      worker-type: pr-gen
  template:
    metadata:
      labels:
        app: worker
        worker-type: pr-gen
    spec:
      containers:
        - name: worker
          image: repo-autopilot/pr-generator-worker:v1.0.0
          env:
            - name: API_BASE_URL
              value: "http://repo-autopilot-control-plane:8000"
            - name: REDIS_URL
              value: "redis://redis-service:6379/0"
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ci-fixer-worker
  labels:
    app: worker
    worker-type: ci-fix
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
      worker-type: ci-fix
  template:
    metadata:
      labels:
        app: worker
        worker-type: ci-fix
    spec:
      containers:
        - name: worker
          image: repo-autopilot/ci-fixer-worker:v1.0.0
          env:
            - name: API_BASE_URL
              value: "http://repo-autopilot-control-plane:8000"
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
